<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Recyclix VALORIX</title>
    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ----- Couleurs VALORIX ----- */
        :root {
            --valorix-blue: #0D6EFD;
            --valorix-blue-dark: #0A4FB3;
            --valorix-green: #43A047;
            --valorix-green-dark: #2E7D32;
            --valorix-orange: #F57C00;
            --valorix-orange-light: #FFF1E3;
            --gray-100: #F5F5F5;
            --gray-300: #E0E0E0;
            --gray-600: #757575;
            --gray-900: #212121;
            --background: #F7F9FC;
            --surface: #FFFFFF;
            --text-primary: #14213D;
            --text-secondary: #5C6B80;
            --error: #D32F2F;
        }

        body {
            background: linear-gradient(135deg, var(--background) 0%, var(--gray-100) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1rem;
            position: relative;
        }

        /* Logo en arrière‑plan (watermark) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("/images/logo.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 400px;
            opacity: 0.07;
            pointer-events: none;
            z-index: 0;
        }

        /* Card de connexion (au‑dessus du watermark) */
        .login-card {
            background: var(--surface);
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--gray-300);
            transition: transform 0.2s ease;
            max-width: 460px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .login-header {
            background: linear-gradient(135deg, var(--valorix-blue) 0%, var(--valorix-blue-dark) 100%);
            border-radius: 32px 32px 0 0;
            padding: 2rem 1.5rem;
            text-align: center;
            color: white;
        }

        .logo {
            max-width: 110px;
            margin-bottom: 1rem;
            background: white;
            border-radius: 60px;
            padding: 6px;
        }

        .login-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .login-header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 0;
        }

        .login-body {
            padding: 2rem 1.8rem;
        }

        .form-label {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .input-group-custom {
            border: 1px solid var(--gray-300);
            border-radius: 60px;
            transition: all 0.2s;
            background: white;
        }

        .input-group-custom:focus-within {
            border-color: var(--valorix-blue);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }

        .form-control-custom {
            border: none;
            background: transparent;
            padding: 0.75rem 1.2rem;
            font-size: 0.95rem;
            border-radius: 60px;
            outline: none;
            width: 100%;
        }

        .form-control-custom:focus {
            box-shadow: none;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--valorix-blue) 0%, var(--valorix-blue-dark) 100%);
            border: none;
            border-radius: 60px;
            padding: 0.8rem;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, var(--valorix-blue-dark) 0%, #083e8a 100%);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
        }

        .alert-custom {
            border-radius: 60px;
            font-size: 0.85rem;
            padding: 0.65rem 1rem;
        }

        .forgot-link {
            color: var(--valorix-blue);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
            color: var(--valorix-blue-dark);
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--gray-600);
            text-align: center;
            margin-top: 1.2rem;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <!-- Logo VALORIX (couleur) -->
        <img th:src="@{/images/logo.png}" alt="VALORIX" class="logo">
        <h2>Espace administration</h2>
        <p>Recyclix • VALORIX</p>
    </div>
    <div class="login-body">
        <!-- Affichage des erreurs -->
        <div th:if="${param.error}" class="alert alert-danger alert-custom mb-3" role="alert">
            <i class="fas fa-exclamation-circle me-1"></i> Identifiants incorrects. Veuillez réessayer.
        </div>
        <div th:if="${param.logout}" class="alert alert-success alert-custom mb-3" role="alert">
            <i class="fas fa-check-circle me-1"></i> Vous avez été déconnecté avec succès.
        </div>

        <!-- Formulaire Spring Security -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Adresse email</label>
                <div class="input-group-custom">
                    <input type="email"
                           id="username"
                           name="username"
                           class="form-control-custom"
                           placeholder="exemple@recyclix.com"
                           autofocus
                           required>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Mot de passe</label>
                <div class="input-group-custom">
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control-custom"
                           placeholder="••••••••"
                           required>
                </div>
            </div>
            <button type="submit" class="btn btn-login w-100 text-white">Se connecter</button>
        </form>

        <div class="footer-text">
            &copy; 2026 Recyclix · VALORIX – Tous droits réservés
        </div>
    </div>
</div>

<!-- FontAwesome (optionnel) -->
<script src="https://kit.fontawesome.com/a...js" crossorigin="anonymous"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
